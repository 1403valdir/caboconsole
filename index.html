<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabo Console - Portal de Utilitários de Redes</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

    <header class="border-b border-slate-800 bg-slate-950/50 backdrop-blur">
        <div class="max-w-6xl mx-auto px-4 py-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center gap-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-wider text-cyan-400 font-mono">
                    &gt;_ CABO CONSOLE
                </h1>
                <p class="text-sm md:text-base text-slate-400 mt-2 font-medium">
                    Portal de Utilitários e Engenharia de Infraestrutura de Redes
                </p>
            </div>
            
            <div class="bg-slate-900 border border-slate-800 rounded-lg p-4 shadow-xl flex items-center gap-4 w-full md:w-auto max-w-sm">
                <div class="p-3 bg-cyan-950/50 rounded-md border border-cyan-800/30">
                    <svg class="w-6 h-6 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                    </svg>
                </div>
                <div>
                    <p class="text-xs text-slate-500 font-mono uppercase tracking-wider">Seu IP Público</p>
                    <p id="user-ip" class="text-base font-bold text-slate-200 font-mono tracking-wide">
                        Detectando...
                    </p>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-12">
        
        <div class="mb-8 flex items-center justify-between">
            <h2 class="text-xl font-bold text-slate-300 flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Console de Ferramentas disponíveis
            </h2>
        </div>

        <div id="grid-ferramentas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="animate-pulse bg-slate-950/40 border border-slate-800 rounded-xl p-6 h-48"></div>
            <div class="animate-pulse bg-slate-950/40 border border-slate-800 rounded-xl p-6 h-48"></div>
            <div class="animate-pulse bg-slate-950/40 border border-slate-800 rounded-xl p-6 h-48"></div>
        </div>

    </main>

    <footer class="border-t border-slate-800 mt-20 bg-slate-950/30">
        <div class="max-w-6xl mx-auto px-4 py-6 text-center text-xs text-slate-500 font-mono">
            &copy; 2026 Cabo Console. Projetado para Engenharia de Redes.
        </div>
    </footer>

    <script>
        // 1. FUNÇÃO PARA DETECTAR O IP DO ANALISTA
        async function buscarIP() {
            const ipElement = document.getElementById('user-ip');
            try {
                // Utiliza a API pública ipify para obter o IP em formato JSON
                const resposta = await fetch('https://api.ipify.org?format=json');
                const dados = await resposta.json();
                ipElement.innerText = dados.ip;
                ipElement.classList.add('text-cyan-400');
            } catch (erro) {
                console.error('Erro ao buscar IP:', erro);
                ipElement.innerText = "Não foi possível detectar";
                ipElement.classList.add('text-rose-400');
            }
        }

        // 2. FUNÇÃO PARA LER O JSON E MONTAR OS CARDS DINAMICAMENTE
        async function carregarFerramentas() {
			const grid = document.getElementById('grid-ferramentas');
			try {
				// Faz o fetch no arquivo local ferramentas.json
				const resposta = await fetch('ferramentas.json');
				if (!resposta.ok) throw new Error('Arquivo JSON não encontrado');
        
				const ferramentas = await resposta.json();
        
				// Limpa o esqueleto de carregamento
				grid.innerHTML = '';

				if(ferramentas.length === 0) {
				grid.innerHTML = '<p class="text-slate-500 font-mono col-span-full">Nenhuma ferramenta homologada no momento.</p>';
				return;
				}

				// Loop para criar a estrutura visual de cada ferramenta do JSON
				ferramentas.forEach(item => {
					const card = document.createElement('a');
					card.href = item.url;
					card.className = "group block bg-slate-950/40 hover:bg-slate-950/80 border border-slate-800 hover:border-cyan-500/50 rounded-xl p-6 transition-all duration-300 shadow-lg hover:shadow-cyan-500/5 hover:-translate-y-1 flex flex-col justify-between h-48";
            
					// ATENÇÃO: Certifique-se de que a linha abaixo começa com CRASE ( ` ) e termina com CRASE ( ` )
					card.innerHTML = `
						<div>
							<div class="flex items-center justify-between mb-3">
								<span class="text-xs font-mono px-2 py-1 rounded bg-slate-800 text-slate-400 border border-slate-700/50 group-hover:text-cyan-300 group-hover:border-cyan-500/30 transition-colors">
									${item.categoria}
								</span>
								<span class="text-slate-600 group-hover:text-cyan-400 transition-colors font-mono text-sm">&lt;/&gt;</span>
							</div>
							<h3 class="text-lg font-bold text-slate-200 group-hover:text-white transition-colors">
								${item.titulo}
							</h3>
							<p class="text-sm text-slate-400 mt-2 line-clamp-2">
								${item.descricao}
							</p>
						</div>
						<div class="text-xs font-mono text-cyan-500 font-semibold mt-4 flex items-center gap-1 opacity-80 group-hover:opacity-100 transition-opacity">
							Acessar console 
							<span class="transform group-hover:translate-x-1 transition-transform">&rarr;</span>
						</div>
					`;
					grid.appendChild(card);
				});

			} catch (erro) {
				console.error('Erro ao processar a arquitetura do hub:', erro);
				grid.innerHTML = `
					<div class="col-span-full bg-rose-950/20 border border-rose-900/50 rounded-lg p-4 text-rose-300 font-mono text-sm text-center">
						ERRO [0x01]: Falha ao carregar a matriz de ferramentas (ferramentas.json). Certifique-se de que o arquivo foi criado na raiz e contém um JSON válido.
					</div>
				`;
			}
		}

        // Executa as rotinas de inicialização do terminal assim que a página carrega
        window.addEventListener('DOMContentLoaded', () => {
            buscarIP();
            carregarFerramentas();
        });
    </script>
</body>
</html>

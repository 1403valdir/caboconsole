<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde do Link & Peering - Cabo Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-6">
    <div class="max-w-4xl mx-auto">
        <a href="../../index.html" class="text-xs font-mono text-cyan-400 hover:underline">&larr; Voltar ao Console</a>
        
        <div class="flex justify-between items-center mt-4 mb-2 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold font-mono text-cyan-400">&gt;_ SAÚDE DO LINK & PEERING</h1>
                <p class="text-slate-400 text-sm">Diagnóstico de RTT (Round-Trip Time) da sua última milha até os principais ASNs e CDNs do país.</p>
            </div>
            <button onclick="executarTestes()" class="bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-bold font-mono text-xs px-4 py-2 rounded transition-colors cursor-pointer">
                REVERSAR ROTAS
            </button>
        </div>

        <div id="grid-destinos" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
            </div>
    </div>

    <script>
        const alvos = [
            { nome: "Globoplay (Globo CDN)", url: "https://globoplay.globo.com/favicon.ico" },
			{ nome: "UOL Portal", url: "https://www.uol.com.br/favicon.ico" },
			{ nome: "Mercado Livre (E-commerce)", url: "https://www.mercadolivre.com.br/favicon.ico" },
			{ nome: "WhatsApp (Meta Edge)", url: "https://www.whatsapp.com/favicon.ico" },
			{ nome: "Instagram (Meta Edge)", url: "https://www.instagram.com/favicon.ico" },
			{ nome: "Microsoft Teams (Azure)", url: "https://teams.microsoft.com/favicon.ico" },
			{ nome: "Gov.br (Serviços Públicos)", url: "https://www.gov.br/favicon.ico" },
			{ nome: "Banco do Brasil", url: "https://www.bancobrasil.com.br/favicon.ico" },
			{ nome: "Cloudflare Edge (Anycast)", url: "https://www.cloudflare.com/favicon.ico" },
			{ nome: "Google Services (YouTube)", url: "https://www.google.com/favicon.ico" },
			{ nome: "AWS Amazon Cloud (SP)", url: "https://aws.amazon.com/favicon.ico" },
			{ nome: "IX.br (PTT Metro SP)", url: "https://ix.br/favicon.ico" }
        ];

        function criarCards() {
            const grid = document.getElementById('grid-destinos');
            grid.innerHTML = alvos.map((alvo, idx) => `
                <div class="p-4 bg-slate-950/40 border border-slate-800 rounded-lg flex justify-between items-center font-mono">
                    <div>
                        <div class="text-sm font-bold text-slate-200">${alvo.nome}</div>
                        <div class="text-[10px] text-slate-500 truncate max-w-[250px]">${alvo.url}</div>
                    </div>
                    <div class="text-right">
                        <div id="rtt-${idx}" class="text-sm font-bold text-slate-400">Pinging...</div>
                        <div id="qualidade-${idx}" class="text-[10px] uppercase font-bold text-slate-600">-</div>
                    </div>
                </div>
            `).join('');
        }

        async function testarDestino(alvo, idx) {
			const rttEl = document.getElementById(`rtt-${idx}`);
			const qualEl = document.getElementById(`qualidade-${idx}`);
			
			// O cache buster impede que o navegador leia o resultado do cache local
			const cacheBuster = `?cb=${Date.now()}-${Math.random()}`;
			const inicio = performance.now();
			
			try {
				// Buscando o asset com timeout curto para simular um ping de infraestrutura
				const controller = new AbortController();
				const timeoutId = setTimeout(() => controller.abort(), 2500); // 2.5s Timeout
		
				await fetch(alvo.url + cacheBuster, { 
					mode: 'no-cors', 
					cache: 'no-store',
					signal: controller.signal 
				});
        
				clearTimeout(timeoutId);
				const rtt = Math.round(performance.now() - inicio);
				
				rttEl.innerText = `${rtt} ms`;
				
				// Calibragem das métricas para a realidade de links domésticos/corporativos no BR
				if (rtt < 30) {
					rttEl.className = "text-sm font-bold text-emerald-400";
					qualEl.innerText = "Excelente (Peering Direto / CDN)";
					qualEl.className = "text-[10px] font-bold text-emerald-500";
				} else if (rtt < 80) {
					rttEl.className = "text-sm font-bold text-cyan-400";
					qualEl.innerText = "Bom (Rotas Estaduais)";
					qualEl.className = "text-[10px] font-bold text-cyan-500";
				} else {
					rttEl.className = "text-sm font-bold text-amber-400";
					qualEl.innerText = "Latência Elevada / Trânsito";
					qualEl.className = "text-[10px] font-bold text-amber-500";
				}
			} catch (err) {
				// Se der abort ou falhar na rota física
				rttEl.innerText = "Timeout / Bloqueado";
				rttEl.className = "text-sm font-bold text-rose-500";
				qualEl.innerText = "Sem resposta ICMP/HTTP";
				qualEl.className = "text-[10px] font-bold text-rose-600";
			}
		}

        function executarTestes() {
            alvos.forEach((alvo, idx) => {
                document.getElementById(`rtt-${idx}`).innerText = "Medindo...";
                document.getElementById(`rtt-${idx}`).className = "text-sm font-bold text-slate-400";
                testarDestino(alvo, idx);
            });
        }

        // Auto-inicializa ao carregar a página
        window.addEventListener('DOMContentLoaded', () => {
            criarCards();
            executarTestes();
        });
    </script>
</body>
</html>

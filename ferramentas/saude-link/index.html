<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saúde do Link & Peering - Cabo Console</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans p-6">
    <div class="max-w-5xl mx-auto">
        <a href="../../index.html" class="text-xs font-mono text-cyan-400 hover:underline">&larr; Voltar ao Console</a>
        
        <div class="flex justify-between items-center mt-4 mb-6 border-b border-slate-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold font-mono text-cyan-400">&gt;_ SAÚDE DO LINK & PEERING</h1>
                <p class="text-slate-400 text-sm">Ferramenta de diagnóstico multi-camadas para medição de latência física e overhead de aplicação.</p>
            </div>
            <button onclick="executarTodosOsTestes()" class="bg-cyan-600 hover:bg-cyan-500 text-slate-950 font-bold font-mono text-xs px-4 py-2 rounded transition-colors cursor-pointer">
                REVERSAR TODAS AS ROTAS
            </button>
        </div>

        <div class="mb-8">
            <div class="flex items-center gap-2 mb-4">
                <div class="h-1.5 w-1.5 rounded-full bg-cyan-400 animate-pulse"></div>
                <h2 class="text-sm font-bold font-mono text-slate-300 uppercase tracking-wider">Aproximação de Camada 3/4 (RTT de Borda & Anycast)</h2>
            </div>
            <div id="grid-c3" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>

        <div>
            <div class="flex items-center gap-2 mb-4">
                <div class="h-1.5 w-1.5 rounded-full bg-amber-400 animate-pulse"></div>
                <h2 class="text-sm font-bold font-mono text-slate-300 uppercase tracking-wider">Métricas de Camada 7 (HTTP Overhead + SSL Handshake)</h2>
            </div>
            <div id="grid-c7" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                </div>
        </div>
    </div>

    <script>
        // Configuração dos alvos focados em infraestrutura de borda (C3/C4 aproximado)
        const alvosC3 = [
            { nome: "Cloudflare Edge (Anycast Internacional)", url: "https://1.1.1.1/cdn-cgi/trace" },
            { nome: "Cloudflare São Paulo (Borda Local)", url: "https://speed.cloudflare.com/__down?bytes=0" },
            { nome: "Amazon AWS Edge (CloudFront SP)", url: "https://dynamodb.sa-east-1.amazonaws.com/ping" },
            { nome: "Google Global Cache (Edge BR)", url: "https://www.google.com/generate_204" },
            { nome: "Google DNS Telemetry", url: "https://8.8.8.8/generate_204" },
            { nome: "Microsoft Azure (Edge Latam)", url: "https://infrastructureinsights.microsoft.com/api/ping" },
            { nome: "Fastly CDN (Borda Regional)", url: "https://www.fastly.com/ping" },
            { nome: "Vercel Edge Network", url: "https://vercel.com/api/ping" }
        ];

        // Configuração dos alvos focados em serviços finais / web (C7)
        const alvosC7 = [
            { nome: "Globoplay (Globo CDN)", url: "https://globoplay.globo.com/favicon.ico" },
            { nome: "UOL Portal", url: "https://www.uol.com.br/favicon.ico" },
            { nome: "Mercado Livre (E-commerce)", url: "https://www.mercadolivre.com.br/favicon.ico" },
            { nome: "WhatsApp (Meta Edge)", url: "https://www.whatsapp.com/favicon.ico" },
            { nome: "Instagram (Meta Edge)", url: "https://www.instagram.com/favicon.ico" },
            { nome: "Microsoft Teams (Azure)", url: "https://teams.microsoft.com/favicon.ico" },
            { nome: "Gov.br (Serviços Públicos)", url: "https://www.gov.br/favicon.ico" },
            { nome: "Banco do Brasil", url: "https://www.bancobrasil.com.br/favicon.ico" }
        ];

        function renderizarGrids() {
            // Renderiza Grid de Camada 3
            document.getElementById('grid-c3').innerHTML = alvosC3.map((alvo, idx) => templateCard('c3', idx, alvo)).join('');
            // Renderiza Grid de Camada 7
            document.getElementById('grid-c7').innerHTML = alvosC7.map((alvo, idx) => templateCard('c7', idx, alvo)).join('');
        }

        function templateCard(prefixo, idx, alvo) {
            return `
                <div class="p-4 bg-slate-950/40 border border-slate-800 rounded-lg flex justify-between items-center font-mono">
                    <div class="truncate mr-2">
                        <div class="text-sm font-bold text-slate-200 truncate">${alvo.nome}</div>
                        <div class="text-[10px] text-slate-500 truncate max-w-[320px]">${alvo.url}</div>
                    </div>
                    <div class="text-right flex-shrink-0">
                        <div id="rtt-${prefixo}-${idx}" class="text-sm font-bold text-slate-400">Pinging...</div>
                        <div id="qual-${prefixo}-${idx}" class="text-[10px] uppercase font-bold text-slate-600">-</div>
                    </div>
                </div>
            `;
        }

        async function testarDestinoC3(alvo, idx) {
            const rttEl = document.getElementById(`rtt-c3-${idx}`);
            const qualEl = document.getElementById(`qual-c3-${idx}`);
            const urlTeste = `${alvo.url}?cb=c3-${idx}-${Date.now()}`;
            const inicio = performance.now();
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2000);

                await fetch(urlTeste, { mode: 'no-cors', cache: 'no-store', priority: 'high', signal: controller.signal });
                clearTimeout(timeoutId);
                
                let rtt = Math.round(performance.now() - inicio);
                const [entry] = performance.getEntriesByName(urlTeste);
                if (entry && entry.duration > 0) rtt = Math.round(entry.duration);

                rttEl.innerText = `${rtt} ms`;
                
                if (rtt < 20) {
                    rttEl.className = "text-sm font-bold text-emerald-400";
                    qualEl.innerText = "Excelente (Fibra / PTT)";
                    qualEl.className = "text-[10px] font-bold text-emerald-500";
                } else if (rtt < 60) {
                    rttEl.className = "text-sm font-bold text-cyan-400";
                    qualEl.innerText = "Bom (Borda Estável)";
                    qualEl.className = "text-[10px] font-bold text-cyan-500";
                } else {
                    rttEl.className = "text-sm font-bold text-amber-400";
                    qualEl.innerText = "Latência Moderada";
                    qualEl.className = "text-[10px] font-bold text-amber-500";
                }
            } catch (err) {
                rttEl.innerText = "Timeout";
                rttEl.className = "text-sm font-bold text-rose-500";
                qualEl.innerText = "Filtro de Rota";
                qualEl.className = "text-[10px] font-bold text-rose-600";
            }
        }

        async function testarDestinoC7(alvo, idx) {
            const rttEl = document.getElementById(`rtt-c7-${idx}`);
            const qualEl = document.getElementById(`qual-c7-${idx}`);
            const urlTeste = `${alvo.url}?cb=c7-${idx}-${Date.now()}`;
            const inicio = performance.now();
            
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 2500);

                await fetch(urlTeste, { mode: 'no-cors', cache: 'no-store', signal: controller.signal });
                clearTimeout(timeoutId);
                
                const rtt = Math.round(performance.now() - inicio);
                rttEl.innerText = `${rtt} ms`;
                
                if (rtt < 90) {
                    rttEl.className = "text-sm font-bold text-emerald-400";
                    qualEl.innerText = "Resposta Rápida (L7)";
                    qualEl.className = "text-[10px] font-bold text-emerald-500";
                } else if (rtt < 250) {
                    rttEl.className = "text-sm font-bold text-cyan-400";
                    qualEl.innerText = "Overhead Comum (SSL)";
                    qualEl.className = "text-[10px] font-bold text-cyan-500";
                } else {
                    rttEl.className = "text-sm font-bold text-amber-400";
                    qualEl.innerText = "Processamento Alto";
                    qualEl.className = "text-[10px] font-bold text-amber-500";
                }
            } catch (err) {
                rttEl.innerText = "Timeout / Erro";
                rttEl.className = "text-sm font-bold text-rose-500";
                qualEl.innerText = "Falha na Sessão Web";
                qualEl.className = "text-[10px] font-bold text-rose-600";
            }
        }

        function executarTodosOsTestes() {
            alvosC3.forEach((alvo, idx) => {
                document.getElementById(`rtt-c3-${idx}`).innerText = "Calculando...";
                document.getElementById(`rtt-c3-${idx}`).className = "text-sm font-bold text-slate-400";
                testarDestinoC3(alvo, idx);
            });
            alvosC7.forEach((alvo, idx) => {
                document.getElementById(`rtt-c7-${idx}`).innerText = "Calculando...";
                document.getElementById(`rtt-c7-${idx}`).className = "text-sm font-bold text-slate-400";
                testarDestinoC7(alvo, idx);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            renderizarGrids();
            executarTodosOsTestes();
        });
    </script>
</body>
</html>
